# ===============================
# APPLICATION
# ===============================
spring.application.name=blocoperatoire-backend
server.port=8080
server.shutdown=graceful

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/bloc_operatoire_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ===============================
# FLYWAY (DISABLED FOR NOW)
# ===============================
spring.flyway.enabled=false

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.tn.softsys.blocoperatoire.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# CUSTOM APP CONFIG
# ===============================
app.security.audit.enabled=true
app.compliance.rgpd.enabled=true
app.compliance.hipaa.enabled=true
app.interop.fhir.base-url=http://localhost:8081/fhir

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=6b7f3e9a9f0d4c8a2b6e1d3f5c7a9e2b4f6c8d1a3e5b7c9d0f2a4b6c8e1d3f5a9
jwt.expiration=345600000
app.refresh-token.expiration=604800000

logging.level.com.tn.softsys.blocoperatoire.security.JwtAuthenticationFilter=DEBUG