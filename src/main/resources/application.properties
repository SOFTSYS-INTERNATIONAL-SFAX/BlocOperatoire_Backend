spring.application.name=blocoperatoire-backend
server.port=8080
server.shutdown=graceful

spring.datasource.url=jdbc:postgresql://localhost:5432/bloc_operatoire_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000/realms/bloc-operatoire

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level %logger{36} - %msg%n

app.security.audit.enabled=true
app.compliance.rgpd.enabled=true
app.compliance.hipaa.enabled=true
app.interop.fhir.base-url=http://localhost:8081/fhir
